# Render Blueprint for the Trimly API (NestJS).
#
# The web frontend is deployed separately on Vercel (see docs/architecture.md);
# this file only provisions the backend. Import it in the Render dashboard via
# "New +" → "Blueprint" and point it at this repo. Render reads the build/start
# commands from here; the secrets below (sync: false) are filled in the dashboard
# on first deploy — Render never stores them in git.
#
# Runs from the repo root (no rootDir) so pnpm can resolve the workspace. Prisma
# client is generated and migrations applied, then the build goes through Turbo
# (`turbo run build --filter @trimly/api`) so the workspace dependency
# @trimly/shared is compiled to its dist/ before @trimly/api — see turbo.json's
# `^build`. Building @trimly/api directly (nest build) would skip that and fail
# with "Cannot find module '@trimly/shared'". The API listens on Render's injected
# $PORT (see apps/api/src/main.ts).
services:
  - type: web
    name: trimly-api
    runtime: node
    region: frankfurt # same region as the Neon DB (eu-central-1)
    plan: free
    branch: main
    # Git auto-deploy is OFF: deploys are triggered by the GitHub Actions `deploy`
    # job via a deploy hook, but only after CI (lint + typecheck + test) passes.
    # This keeps a red build from reaching production. See .github/workflows/ci.yml.
    autoDeploy: false
    healthCheckPath: /health
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @trimly/api prisma:generate &&
      pnpm --filter @trimly/api prisma:deploy &&
      pnpm turbo run build --filter @trimly/api
    startCommand: pnpm --filter @trimly/api start:prod
    envVars:
      # pnpm 11 (pinned in package.json "packageManager") requires Node >= 22.13,
      # so build on Node 22. Also satisfies engines.node (>=20).
      - key: NODE_VERSION
        value: "22"
      # Pooled Neon connection used by the app at runtime.
      - key: DATABASE_URL
        sync: false
      # Direct (non-pooled) Neon connection used by Prisma Migrate.
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      # Barber self-registration email (see docs/architecture.md). Resend API key
      # and sender are dashboard-filled; leaving RESEND_API_KEY unset makes the
      # API log the confirmation link instead of sending it (dev fallback).
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Frontend origin (the Vercel URL) used to build the confirmation link
      # …/register/confirm?token=. Must be set, or links point at localhost.
      - key: WEB_APP_URL
        sync: false
