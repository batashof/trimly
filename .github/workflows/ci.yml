name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @trimly/api prisma:generate

      - name: Build shared package
        run: pnpm --filter @trimly/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # Deploy only after `build` (lint + typecheck + test) is green, and only on a
  # real push to main — never on PRs. Render and Vercel git auto-deploy is turned
  # off (see render.yaml autoDeploy:false and apps/web/vercel.json), so these
  # deploy hooks are the single path to production: a red CI never ships.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render (API) deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set"; exit 1
          fi
          curl -fsS -X POST "$HOOK"

      - name: Trigger Vercel (web) deploy
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK secret is not set"; exit 1
          fi
          curl -fsS -X POST "$HOOK"
